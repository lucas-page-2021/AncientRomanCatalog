<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Jewelry | Ancient Roman Catalog</title>
    <meta
      name="description"
      content="Learn about Roman jewelry and see an estimated price in denarii and sestertii."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="pattern pattern-left"></div>
      <div class="corner-mark" aria-hidden="true"></div>

      <main class="detail-page">
        <a class="back-link" href="./index.html">Back to catalog</a>
        <article class="detail-card detail-card-page item-jewelry">
          <img src="./assets/jewelry.png" alt="Ancient Roman jewelry display" />
          <div class="detail-copy">
            <h1 class="detail-title">Jewelry</h1>
            <p><strong>Armilla:</strong> Est qualitas. Pretium est 200 sestertii.</p>
            <p><strong>Inaures:</strong> Mirabile visu! Inaures est facta ex aureo! Pretium est 300 sestertii.</p>
            <p><strong>Monile:</strong> Monile est facta ex argento. Petrium est 500 sestertii.</p>
          </div>
        </article>
      </main>
    </div>
