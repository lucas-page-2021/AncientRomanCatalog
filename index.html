<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Roman Catalog</title>
    <meta
      name="description"
      content="A visual catalog of ancient Roman clothing and accessories."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="pattern pattern-left"></div>
      <div class="pattern pattern-top-right"></div>
      <div class="pattern pattern-bottom-left"></div>
      <div class="corner-mark" aria-hidden="true"></div>

      <header class="hero">
        <p class="eyebrow">Ancient Roman Dress Archive</p>
        <h1>Our Catalog</h1>
        <p class="intro">
          Explore the garments, footwear, and ornaments that shaped Roman
          identity from the forum to the household.
        </p>
      </header>

      <main>
        <section class="catalog-grid" aria-label="Catalog categories">
          <a class="catalog-card" href="#palla" id="palla">
            <div class="art art-palla" aria-hidden="true">
              <div class="figure standing">
                <span class="head"></span>
                <span class="drape"></span>
              </div>
            </div>
            <span class="label">Palla</span>
          </a>

          <a class="catalog-card" href="#stola" id="stola">
            <div class="art art-stola" aria-hidden="true">
              <div class="figure seated">
                <span class="head"></span>
                <span class="drape"></span>
              </div>
            </div>
            <span class="label">Stola</span>
          </a>

          <a class="catalog-card" href="#shoes" id="shoes">
            <div class="art art-shoes" aria-hidden="true">
              <div class="shoe">
                <span class="strap strap-a"></span>
                <span class="strap strap-b"></span>
                <span class="strap strap-c"></span>
                <span class="lace"></span>
              </div>
            </div>
            <span class="label">Shoes</span>
          </a>

          <a class="catalog-card" href="#toga" id="toga">
            <div class="art art-toga" aria-hidden="true">
              <div class="figure model">
                <span class="head"></span>
                <span class="drape"></span>
              </div>
            </div>
            <span class="label">Toga</span>
          </a>

          <a class="catalog-card" href="#tunica" id="tunica">
            <div class="art art-tunica" aria-hidden="true">
              <div class="figure tunic-model">
                <span class="head"></span>
                <span class="tunic"></span>
              </div>
            </div>
            <span class="label">Tunica</span>
          </a>

          <a class="catalog-card" href="#jewelry" id="jewelry">
            <div class="art art-jewelry" aria-hidden="true">
              <div class="jewelry">
                <span class="ring ring-a"></span>
                <span class="ring ring-b"></span>
                <span class="chain"></span>
              </div>
            </div>
            <span class="label">Jewelry</span>
          </a>
        </section>
      </main>

      <footer class="footer">
        <p>ancientromancatalog.com</p>
      </footer>
    </div>
  </body>
</html>
