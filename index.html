<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Roman Catalog</title>
    <meta
      name="description"
      content="A visual catalog of ancient Roman clothing and accessories."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="pattern pattern-left"></div>
      <div class="corner-mark" aria-hidden="true"></div>

      <header class="hero">
        <p class="eyebrow">Ancient Roman Dress Archive</p>
        <h1>Our Catalog</h1>
        <p class="intro">
          Explore the garments, footwear, and ornaments that shaped Roman
          identity from the forum to the household.
        </p>
      </header>

      <main>
        <section class="catalog-grid" aria-label="Catalog categories">
          <a class="catalog-card item-palla" href="./palla.html">
            <div class="art">
              <img src="./assets/palla.png" alt="Palla draped garment" />
            </div>
            <span class="label">Palla</span>
          </a>

          <a class="catalog-card item-stola" href="./stola.html">
            <div class="art">
              <img src="./assets/stola.png" alt="Stola on a seated Roman figure" />
            </div>
            <span class="label">Stola</span>
          </a>

          <a class="catalog-card item-shoes" href="./shoes.html">
            <div class="art">
              <img src="./assets/shoes.png" alt="Ancient Roman lace-up shoes" />
            </div>
            <span class="label">Shoes</span>
          </a>

          <a class="catalog-card item-toga" href="./toga.html">
            <div class="art">
              <img src="./assets/toga.png" alt="Model wearing a Roman toga" />
            </div>
            <span class="label">Toga</span>
          </a>

          <a class="catalog-card item-tunica" href="./tunica.html">
            <div class="art">
              <img src="./assets/tunica masculina.png" alt="Tunica masculina" />
            </div>
            <span class="label">Tunica</span>
          </a>

          <a class="catalog-card item-jewelry" href="./jewelry.html">
            <div class="art">
              <img src="./assets/jewelry.png" alt="Ancient Roman jewelry display" />
            </div>
            <span class="label">Jewelry</span>
          </a>
        </section>
      </main>

      <footer class="footer">
        <p>ancientromancatalog.com</p>
      </footer>
    </div>
  </body>
</html>
