<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toga | Ancient Roman Catalog</title>
    <meta
      name="description"
      content="Learn what the Roman toga was and see an estimated price in denarii and sestertii."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="pattern pattern-left"></div>
      <div class="corner-mark" aria-hidden="true"></div>

      <main class="detail-page">
        <a class="back-link" href="./index.html">Back to catalog</a>
        <article class="detail-card detail-card-page detail-card-split item-toga">
          <div class="detail-side detail-side-left">
            <figure class="detail-figure">
              <img src="./assets/toga virilis.png" alt="Toga virilis" />
              <figcaption>Toga virilis</figcaption>
            </figure>
          </div>
          <div class="detail-copy">
            <h1 class="detail-title">Toga</h1>
            <p><strong>Toga virilis:</strong> Toga virilis est simplex. Toga est facta e lana. Pretium est 150 sestertii.</p>
            <p><strong>Toga praetexta:</strong> Toga praetexta habet virga purpureus. Est sumptuosus. Pretium est 700 sestertii.</p>
          </div>
          <div class="detail-side detail-side-right">
            <figure class="detail-figure">
              <img src="./assets/toga praetexta.png" alt="Toga praetexta" />
              <figcaption>Toga praetexta</figcaption>
            </figure>
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
