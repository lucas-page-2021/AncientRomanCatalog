<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoes | Ancient Roman Catalog</title>
    <meta
      name="description"
      content="Learn about Roman shoes and see an estimated price in denarii and sestertii."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="pattern pattern-left"></div>
      <div class="corner-mark" aria-hidden="true"></div>

      <main class="detail-page">
        <a class="back-link" href="./index.html">Back to catalog</a>
        <article class="detail-card detail-card-page item-shoes">
          <div class="detail-figures">
            <figure class="detail-figure">
              <img src="./assets/caliga.png" alt="Caliga" />
              <figcaption>Caliga</figcaption>
            </figure>
            <figure class="detail-figure">
              <img src="./assets/solea.png" alt="Solea" />
              <figcaption>Solea</figcaption>
            </figure>
            <figure class="detail-figure">
              <img src="./assets/calceus.png" alt="Calceus" />
              <figcaption>Calceus</figcaption>
            </figure>
            <figure class="detail-figure">
              <img src="./assets/mulleus.png" alt="Mulleus" />
              <figcaption>Mulleus</figcaption>
            </figure>
          </div>
          <div class="detail-copy">
            <h1 class="detail-title">Shoes</h1>
            <p><strong>Caliga:</strong> Caliga est gravis. Pretium est 50 sestertii.</p>
            <p><strong>Solea:</strong> Solea est levis et vilis. Pretium est 15 sestertii.</p>
            <p><strong>Calceus:</strong> Hic calceus est factus e corio. Pretium est 50 sestertii.</p>
            <p><strong>Mulleus:</strong> Mulleus est qualitas et sumptuosus. Est ruber. Pretium est 150 sestertii.</p>
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
